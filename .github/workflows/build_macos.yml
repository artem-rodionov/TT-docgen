name: Build macOS executable

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write 

jobs:

  lint:
    uses: ./.github/workflows/baseflow.yml

  build:
    name: Build macOS
    runs-on: macos-15-intel
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Clean previous builds
        run: rm -rf build dist

      - name: Build with PyInstaller
        run: |
          source .venv/bin/activate
          # uv run pyinstaller example.spec
          pyinstaller --windowed --onedir --name DocGen --hidden-import openstep_plist.util --hidden-import openstep_plist.parser src/docgen/main.py

      - name: Archive app
        run: |
          cd dist
          zip -r DocGen-macOS.zip DocGen.app

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: DocGen-macOS
          path: dist/DocGen-macOS.zip

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: DocGen-macOS
          path: dist

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: dist/DocGen-macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}