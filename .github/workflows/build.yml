name: Build executable

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write 

jobs:

  lint:
    uses: ./.github/workflows/baseflow.yml
    secrets: inherit

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      matrix:
        os: 
          - macos-15-intel
          - ubuntu-latest
          - macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Clean previous builds
        run: rm -rf build dist

      - name: Build with PyInstaller
        run: |
          source .venv/bin/activate
          if [ "${{ runner.os }}" == "macOS" ]; then
            WINDOWED="--windowed"
          else
            WINDOWED=""
          fi
          echo $WINDOWED
          pyinstaller $WINDOWED --onedir --name DocGen \
            --hidden-import openstep_plist.util \
            --hidden-import openstep_plist.parser \
            src/docgen/main.py

      - name: Archive app
        run: |
          cd dist
          if [[ "${{ matrix.os }}" == macos-* ]]; then
            ARCH=$(uname -m)
            ZIP_NAME="DocGen-macOS-${ARCH}.zip"
            zip -r "$ZIP_NAME" DocGen.app
          else
            ZIP_NAME="DocGen-Linux.zip"
            zip -r "$ZIP_NAME" DocGen
          fi
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ZIP_NAME }}
          path: dist/${{ env.ZIP_NAME }}

  release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: Release ${{ steps.get_version.outputs.VERSION }}
          draft: false
          prerelease: false
          files: dist/**/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}